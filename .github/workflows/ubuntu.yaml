name: UBUNTU SSH
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      USERNAME: "dolvin"
      PASSWORD: "whatsapp2"
      TS_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # --- 1. INSTAL TAILSCALE DULUAN ---
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale
        run: |
          sudo tailscaled & sleep 5
          sudo tailscale up --authkey="${{ env.TS_AUTH_KEY }}" --hostname=runner-${{ github.run_id }} --ssh
          echo "IP Address Runner:"
          tailscale ip -4

      # --- 2. PERSIAPAN SISTEM & USER ---
      - name: Prepare System & Create User
        run: |
          sudo apt update -y
          sudo apt install ffmpeg git -y
          sudo useradd -m -s /bin/bash "$USERNAME" || true
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME" || true

      # --- 3. INSTAL DEPENDENCIES (DRACIN) ---
      - name: Install Drachin dependencies
        run: |
          # Clone repo kamu
          git clone https://github.com/D0LV1N19/Drachin.git
          cd Drachin
          
          # Setup VENV
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          
          # Install requirements
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # --- 4. KEEP ALIVE ---
      - name: Keep Alive
        run: |
          echo "✅ Connected via Tailscale"
          echo "➡️  SSH via: tailscale ssh $USERNAME@runner-${{ github.run_id }}"
          while true; do sleep 300; done
